name: Feature request
description: Propose a focused product or engineering improvement.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Keep requests concrete. Describe the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Today it is difficult to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the app or tooling do instead?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful if you already evaluated tradeoffs.
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Nice to have
        - Improves reliability
        - Improves UX
        - Improves maintainability
        - Critical
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, prior art, data, or implementation constraints.
